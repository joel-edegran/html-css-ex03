<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parkeringsgarage i realtid | SmartParking Live</title>
    <meta name="description" content="Se lediga platser i vårt digitala parkeringsgarage live. SmartParking AB erbjuder smidig parkering med realtidsuppdaterad karta över lediga rutor.">
</head>
<body>
    <header class="site-header" role="banner">
        <h1 class="logo">
            <a href="/" class="logo-link">SmartParking Live</a>
        </h1>
        <nav>
            <ul class="menu-list">
                <li><a class="menu-link" href="#karta">Karta</a></li>
                <li><a class="menu-link" href="#info">Info</a></li>
            </ul>
        </nav>
    </header>
    <main class="content-area">
        <section class="garage-container">
            <h2>Live-vy: Garageplan A</h2>
            <p>Klicka på en ruta för att se detaljer.</p>
            <div class="floor-layout" aria-live="polite">
                <button type="button" class="spot" aria-label="Parkeringsruta 1: Upptagen">
                    <span role="img" aria-label="En röd bil" aria-hidden="true">🚗</span>
                </button>
                <button type="button" class="spot" aria-label="Parkeringsruta 2: Upptagen">
                    <span role="img" aria-label="En röd bil" aria-hidden="true">🚗</span>
                </button>
                <button type="button" class="spot" aria-label="Parkeringsruta 3: Ledig"></button>
                <button type="button" class="spot" aria-label="Parkeringsruta 4: Upptagen">
                    <span role="img" aria-label="En röd bil" aria-hidden="true">🚗</span>
                </button>
            </div>
        </section>
        <section class="info-sidebar" role="complementary">
            <h2>Priser och Regler</h2>
            <p>Standardtaxa: 20 kr/h. Orangea streckade linjer visar zongränsen.</p>
        </section>
    </main>
    <footer class="footer-area" role="contentinfo">
        <p><small>&copy; 2026 SmartParking AB</small></p>
    </footer>
    <script type="module" src="/assets/scripts/main.js"></script>
</body>
</html>
